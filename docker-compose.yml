services:
  db:
    image: postgres:15-alpine
    container_name: tecnimatica_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${DB_NAME:-tecnimatica_monitoring}
    ports:
      - "${DB_PORT_OUT:-5435}:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - tecnimatica_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tecnimatica_monitoring}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tecnimatica_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgrespassword}
      DB_NAME: ${DB_NAME:-tecnimatica_monitoring}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: tecnimatica_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  tecnimatica_db_data:
